<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>وHSK 1 | المنهج الشامل 500 كلمة</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;700&family=Cairo:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap"
    rel="stylesheet">
  <link rel='stylesheet' href='css/style.css'>
</head>

<body>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:999999;font-size:18px;direction:ltr;text-align:left;';
      errDiv.innerHTML = '<b>JS Error:</b> ' + message + '<br><b>File:</b> ' + source + ':' + lineno + ':' + colno;
      document.body.appendChild(errDiv);
    };
  </script>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand" onclick="showTab('home')">
        <span class="brand-mark">中</span>
        <div class="brand-text">
          <span class="brand-title" id="brand-title">تعلم الصينية</span>
          <span class="brand-sub">HSK1 Learning Platform</span>
        </div>
      </div>
      <button class="menu-toggle" onclick="toggleMenu(event)">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="topbar-actions">
        <div class="user-stats">
          <span id="user-xp">0 XP</span>
          <span id="user-streak">Streak 1</span>
        </div>
        <button class="lang-toggle py-toggle" onclick="togglePinyin()">
          <span>🔤</span>
          <span class="pinyin-text">إخفاء Pinyin</span>
        </button>
        <button class="lang-toggle" onclick="toggleTheme()" id="theme-btn">Light</button>
        <button class="lang-toggle" onclick="toggleLang()">
          <span id="lang-btn-text">English</span>
        </button>
      </div>
    </div>
  </header>
  <!-- Overlay خلف القائمة — يُغلق عند النقر عليه -->
  <div class="nav-overlay" id="nav_overlay" onclick="closeNav()"></div>
  <!-- القائمة خارج الـ header تماماً — لأن backdrop-filter يكسر position:fixed -->
  <nav class="topnav" id="top_nav"></nav>
  <!-- تلميح scroll "▼ مزيد" يظهر فوق آخر عنصر مرئي -->
  <div class="nav-scroll-hint" id="nav_hint">▼ مزيد</div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="min">
      <div class="mem" id="mEm">🎉</div>
      <div class="mt" id="mT">أحسنت!</div>
      <div class="msc" id="mSc">10/10</div>
      <div class="mmsg" id="mMsg">>عمل ممتاز!</div>
      <button class="mcl" onclick="document.getElementById('modal').classList.remove('show')"> إغلاق ✖</button>
    </div>
  </div>

  <div id="app">
    <div id="content">
      <div id="main_area"></div>
      <div style="text-align:center;padding:1.5rem;color:#aaa;font-size:.8rem;border-top:1px dashed #ddd;margin-top:2rem;">
        <p>📚 تطبيق تعلم الصينية - المستوى الأول HSK1</p>
        <p>🇨🇳 جميع الحقوق محفوظة © <strong>Hossam aldeen Hassan</strong> 2026</p>
        <p>🌟 نتمنى لك تجربة تعلم ممتعة!</p>
      </div>
    </div>
  </div>
  <script src='data/data.js'></script>
  <script src='data/full_dict.js'></script>
  <script src='js/app.js'></script>

</body>

</html>
